{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Weather Forecast{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Sora:wght@500;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{% static 'css/style.css' %}" rel="stylesheet">
  {% block extra_head %}{% endblock %}
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="rain-overlay"></div>

  <header class="site-header">
    <nav class="navbar navbar-expand-lg">
      <div class="container">
        <a class="navbar-brand brand-text" href="{% url 'forecast:home' %}">Weather Forecast</a>
        <div class="nav-chip-group d-flex align-items-center gap-2 ms-auto">
          <a class="chip-link chip-link-primary" href="{% url 'forecast:home' %}">
            <span class="chip-dot" aria-hidden="true"></span>
            Search
          </a>
          <button
            type="button"
            class="chip-link chip-link-theme js-theme-toggle"
            aria-pressed="false"
            aria-label="Toggle weather color theme"
            title="Toggle weather color theme"
          >
            <span class="theme-logo" aria-hidden="true"></span>
          </button>
        </div>
      </div>
    </nav>
  </header>

  <main class="container py-4 py-md-5 page-shell">
    {% block content %}{% endblock %}
  </main>

  <footer class="container pb-4 text-center text-light small opacity-75">
    Powered by OpenWeatherMap
  </footer>

  <script src="{% static 'js/app.js' %}"></script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
